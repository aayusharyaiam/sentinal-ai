<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" fill="#0f172a"/>
  
  <!-- Glow effect -->
  <circle cx="50" cy="40" r="32" fill="#06b6d4" opacity="0.15" filter="url(#glow)"/>
  
  <!-- Shield shape -->
  <path d="M 50 15 L 72 28 L 72 48 Q 72 68 50 82 Q 28 68 28 48 L 28 28 Z" 
        fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Inner shield accent -->
  <path d="M 50 22 L 68 33 L 68 48 Q 68 62 50 74 Q 32 62 32 48 L 32 33 Z" 
        fill="none" stroke="#06b6d4" stroke-width="1.2" opacity="0.4"/>
  
  <!-- Center targeting crosshair -->
  <circle cx="50" cy="48" r="8" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
  <path d="M 50 42 L 50 54 M 44 48 L 56 48" stroke="#06b6d4" stroke-width="1.2" opacity="0.8"/>
  
  <!-- Accent dot -->
  <circle cx="50" cy="48" r="2" fill="#06b6d4"/>
  
  <!-- Corner accents for cyberpunk feel -->
  <rect x="28" y="28" width="4" height="4" fill="#06b6d4" opacity="0.6"/>
  <rect x="68" y="28" width="4" height="4" fill="#06b6d4" opacity="0.6"/>
</svg>